<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCSY Smart Roll Call</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #6366f1;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        .tab.active {
            opacity: 1;
            border-bottom: 3px solid var(--primary);
            font-weight: 600;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        h2 { text-align: center; margin-bottom: 1.5rem; }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(1.1);
        }

        button:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 1rem;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        video, canvas {
            width: 100%;
            display: block;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #qr-reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
        }

        .status {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div style="font-size: 1.5rem; margin-bottom: 1rem;">Loading Models...</div>
    <div id="load-status">Please wait while we initialize face recognition.</div>
</div>

<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="showTab('register')">Register</div>
        <div class="tab" onclick="showTab('rollcall')">Roll Call</div>
        <div class="tab" onclick="showTab('dashboard')">Dashboard</div>
    </div>

    <!-- Register Tab -->
    <div id="register" class="content-section active">
        <h2>Student Registration</h2>
        <div class="input-group">
            <input type="text" id="reg-id" placeholder="Enter YKPT ID (e.g., YKPT-123)">
        </div>
        <div class="video-container">
            <video id="reg-video" autoplay muted playsinline></video>
            <canvas id="reg-canvas"></canvas>
        </div>
        <button id="btn-register" onclick="handleRegister()">Scan & Register Face</button>
        <div id="reg-status" class="status"></div>
    </div>

    <!-- Roll Call Tab -->
    <div id="rollcall" class="content-section">
        <h2>Smart Roll Call</h2>
        <div id="qr-section">
            <p style="text-align: center;">Scan Student QR Code</p>
            <div id="qr-reader"></div>
        </div>
        <div id="face-section" style="display: none;">
            <p style="text-align: center;">Verifying: <span id="verifying-id"></span></p>
            <div class="video-container">
                <video id="verify-video" autoplay muted playsinline></video>
                <canvas id="verify-canvas"></canvas>
            </div>
            <div id="verify-status" class="status">Verifying face...</div>
        </div>
    </div>

    <!-- Dashboard Tab -->
    <div id="dashboard" class="content-section">
        <h2>Attendance Dashboard</h2>
        <button onclick="exportToCSV()">Export to CSV</button>
        <div style="overflow-x: auto;">
            <table id="attendance-table">
                <thead>
                    <tr>
                        <th>YKPT ID</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="attendance-body">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    // Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAF_N4YtuhFnbZx1DEej6oAq28HlqHoudI",
        authDomain: "login-bbb60.firebaseapp.com",
        projectId: "login-bbb60",
        storageBucket: "login-bbb60.firebasestorage.app",
        messagingSenderId: "493152808428",
        appId: "1:493152808428:web:97a2e23335dc1e1840a4c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Global Variables
    let currentStream = null;
    let html5QrCode = null;
    let labeledFaceDescriptors = [];

    // Initialize Models
    async function initModels() {
        try {
            const MODEL_URL = '/models';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            document.getElementById('loading-overlay').style.display = 'none';
            startCamera('reg-video');
        } catch (err) {
            console.error(err);
            document.getElementById('load-status').innerText = "Error loading models. Ensure /models folder exists.";
        }
    }

    // Tab Switching
    window.showTab = (tabId) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        
        event.currentTarget.classList.add('active');
        document.getElementById(tabId).classList.add('active');

        stopCamera();
        if (tabId === 'register') startCamera('reg-video');
        if (tabId === 'rollcall') startQRScanner();
        if (tabId === 'dashboard') loadAttendance();
    };

    // Camera Controls
    async function startCamera(videoId) {
        stopCamera();
        const video = document.getElementById(videoId);
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = currentStream;
        } catch (err) {
            console.error("Camera error:", err);
        }
    }

    function stopCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }
        if (html5QrCode) {
            html5QrCode.stop().catch(() => {});
        }
    }

    // Registration Logic
    window.handleRegister = async () => {
        const id = document.getElementById('reg-id').value.trim();
        if (!id) return alert("Please enter YKPT ID");

        const video = document.getElementById('reg-video');
        const status = document.getElementById('reg-status');
        status.innerText = "Scanning face...";

        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();

        if (!detection) {
            status.innerText = "No face detected. Try again.";
            return;
        }

        try {
            const descriptorArray = Array.from(detection.descriptor);
            await setDoc(doc(db, "Students", id), {
                ykptId: id,
                faceDescriptor: descriptorArray,
                createdAt: serverTimestamp()
            });
            status.innerText = "Registration Successful!";
            document.getElementById('reg-id').value = "";
        } catch (err) {
            console.error(err);
            status.innerText = "Error saving to database.";
        }
    };

    // Roll Call Logic
    function startQRScanner() {
        document.getElementById('qr-section').style.display = 'block';
        document.getElementById('face-section').style.display = 'none';
        
        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
                html5QrCode.stop().then(() => {
                    handleQRResult(decodedText);
                });
            }
        ).catch(err => console.error("QR Error:", err));
    }

    async function handleQRResult(ykptId) {
        document.getElementById('qr-section').style.display = 'none';
        document.getElementById('face-section').style.display = 'block';
        document.getElementById('verifying-id').innerText = ykptId;
        document.getElementById('verify-status').innerText = "Checking student record...";

        // Fetch student descriptor
        const docRef = doc(db, "Students", ykptId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
            alert("Student not registered!");
            startQRScanner();
            return;
        }

        const registeredDescriptor = new Float32Array(docSnap.data().faceDescriptor);
        await startCamera('verify-video');
        
        const video = document.getElementById('verify-video');
        
        // Face Verification Loop
        const verifyInterval = setInterval(async () => {
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptor();

            if (detection) {
                const distance = faceapi.euclideanDistance(detection.descriptor, registeredDescriptor);
                if (distance < 0.6) {
                    clearInterval(verifyInterval);
                    document.getElementById('verify-status').innerText = "Verified! Recording attendance...";
                    recordAttendance(ykptId);
                } else {
                    document.getElementById('verify-status').innerText = "Face mismatch. Please look at camera.";
                }
            }
        }, 1000);
    }

    async function recordAttendance(ykptId) {
        try {
            await addDoc(collection(db, "Attendance"), {
                ykptId: ykptId,
                timestamp: serverTimestamp(),
                status: "Present"
            });
            alert("Attendance Recorded for " + ykptId);
            startQRScanner();
        } catch (err) {
            console.error(err);
            alert("Error recording attendance.");
        }
    }

    // Dashboard Logic
    async function loadAttendance() {
        const tbody = document.getElementById('attendance-body');
        tbody.innerHTML = "<tr><td colspan='3'>Loading...</td></tr>";
        
        const q = query(collection(db, "Attendance"));
        const querySnapshot = await getDocs(q);
        
        tbody.innerHTML = "";
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const date = data.timestamp ? data.timestamp.toDate().toLocaleString() : "Pending...";
            tbody.innerHTML += `
                <tr>
                    <td>${data.ykptId}</td>
                    <td>${date}</td>
                    <td>${data.status}</td>
                </tr>
            `;
        });
    }

    window.exportToCSV = () => {
        const rows = [["YKPT ID", "Time", "Status"]];
        const tableRows = document.querySelectorAll("#attendance-table tr");
        
        for (let i = 1; i < tableRows.length; i++) {
            const cols = tableRows[i].querySelectorAll("td");
            rows.push([cols[0].innerText, cols[1].innerText, cols[2].innerText]);
        }

        let csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "attendance_report.csv");
        document.body.appendChild(link);
        link.click();
    };

    // Start
    initModels();
</script>

</body>
</html>
